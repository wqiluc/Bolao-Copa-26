services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao123
      POSTGRES_DB: bolao_copa26
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_copa26"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bolao:bolao123@db:5432/bolao_copa26
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: >
      sh -c "python -m app.popular && uvicorn app.principal:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ../frontend/html:/usr/share/nginx/html:ro
      - ../frontend/css:/frontend/css:ro
      - ../frontend/js:/frontend/js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
