<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão Copa do Mundo 2026 (Familia Paguetti)</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header>
  <span>⚽</span>
  <h1 align="center">Bolão Copa do Mundo 2026 🏆</h1>
</header>

<nav>
  <button class="active" onclick="mostrarAba('tab-scores')">🏆 Placar</button>
  <button onclick="mostrarAba('tab-matches')">📅 Jogos</button>
  <button onclick="mostrarAba('tab-bets')">🎯 Apostas</button>
</nav>

<main>
  <div id="tab-scores" class="tab active">
    <div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem">
      <button id="btn-recalcular" class="btn btn-blue btn-sm" onclick="recalcularPontuacoes()">🔄 Recalcular Pontuações</button>
    </div>
    <div class="loading" id="scores-loading">Carregando...</div>
    <div id="scores-content" class="hidden"></div>
  </div>

  <div id="tab-matches" class="tab">

    <div class="match-filters">
      <input type="text" id="match-search" placeholder="🔍 Buscar por time..." oninput="filtrarJogos(this.value)"/>
      <div class="date-filter-row">
        <input type="date" id="date-filter" onchange="filtrarPorData(this.value)"/>
        <button class="btn btn-gold btn-sm" onclick="filtrarHoje()">Hoje</button>
        <button class="btn btn-blue btn-sm" onclick="limparFiltros()">✕ Limpar</button>
      </div>
    </div>

    <div class="loading" id="matches-loading">Carregando...</div>
    <div id="matches-content" class="hidden"></div>
  </div>

  <div id="tab-bets" class="tab">

    <div class="bet-filters">
      <div>
        <label>Participante</label><br/>
        <select id="bet-participant-filter" onchange="carregarApostas()">
          <option value="">Todos</option>
        </select>
      </div>

      <div>
        <label>Fase</label><br/>
        <select id="bet-phase-filter" onchange="carregarApostas()">
          <option value="">Todas</option>
        </select>
      </div>

    </div>
    <div class="loading" id="bets-loading">Carregando...</div>
    <div id="bets-content" class="hidden"></div>
  </div>

</main>

<div id="result-modal" class="modal-overlay hidden">

  <div class="modal">
    <span class="close" onclick="fecharModal('result-modal')">✕</span>
    <h3 id="result-modal-title">Registrar Resultado</h3>
    <div class="field">
      <label id="result-home-label">Casa</label>
      <input type="number" id="result-home" min="0" max="30" value="0"/>
    </div>

    <div class="field">
      <label id="result-away-label">Fora</label>
      <input type="number" id="result-away" min="0" max="30" value="0"/>
    </div>

    <div class="actions">
      <button class="btn btn-red" onclick="fecharModal('result-modal')">Cancelar</button>
      <button id="btn-buscar-resultado" class="btn btn-blue" onclick="buscarResultadoExterno()">🌐 Buscar</button>
      <button class="btn btn-green" onclick="enviarResultado()">Salvar</button>
    </div>
  </div>
</div>

<div id="bet-modal" class="modal-overlay hidden">
  
  <div class="modal">
    <span class="close" onclick="fecharModal('bet-modal')">✕</span>
    <h3 id="bet-modal-title">Registrar Aposta</h3>
    <div class="field">
      <label>Participante</label>
      <select id="bet-modal-participant" style="width:100%"></select>
    </div>

    <div class="field">
      <label id="bet-home-label">Casa</label>
      <input type="number" id="bet-home" min="0" max="30" value="1" />
    </div>

    <div class="field">
      <label id="bet-away-label">Fora</label>
      <input type="number" id="bet-away" min="0" max="30" value="0" />
    </div>

    <div class="actions">
      <button class="btn btn-red" onclick="fecharModal('bet-modal')">Cancelar</button>
      <button class="btn btn-gold" onclick="enviarAposta()">Apostar</button>
    </div>

  </div>
</div>

<div id="teams-modal" class="modal-overlay hidden">

  <div class="modal">
    <span class="close" onclick="fecharModal('teams-modal')">✕</span>
    <h3>Definir Times</h3>
    <div class="field">
      <label>Time da Casa</label>
      <select id="times-casa" style="width:100%"></select>
    </div>

    <div class="field">
      <label>Time Visitante</label>
      <select id="times-fora" style="width:100%"></select>
    </div>

    <div class="actions">
      <button class="btn btn-red" onclick="fecharModal('teams-modal')">Cancelar</button>
      <button class="btn btn-blue" onclick="enviarTimes()">Salvar</button>
    </div>
  
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/app.js?v=7"></script>
</body>
</html>
