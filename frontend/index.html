<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão Copa do Mundo 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a1628;
      color: #e0e6f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
      border-bottom: 2px solid #c8a84b;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 { font-size: 1.4rem; color: #c8a84b; font-weight: 700; }
    header span { font-size: 1.8rem; }

    nav {
      display: flex;
      gap: 0;
      background: #0d1e33;
      border-bottom: 1px solid #1e3a5c;
      padding: 0 1rem;
    }

    nav button {
      background: none;
      border: none;
      color: #8aabcc;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    nav button.active { color: #c8a84b; border-bottom-color: #c8a84b; }
    nav button:hover:not(.active) { color: #e0e6f0; }

    main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }

    .tab { display: none; }
    .tab.active { display: block; }

    /* Leaderboard */
    .podium { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }

    .podium-card {
      flex: 1; min-width: 160px;
      background: linear-gradient(145deg, #1a3a5c, #0d2137);
      border: 1px solid #1e3a5c;
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      position: relative;
    }

    .podium-card.rank-1 { border-color: #c8a84b; box-shadow: 0 0 18px rgba(200,168,75,0.25); }
    .podium-card.rank-2 { border-color: #9e9e9e; }
    .podium-card.rank-3 { border-color: #cd7f32; }

    .podium-card .rank { font-size: 1.8rem; }
    .podium-card .name { font-size: 1.1rem; font-weight: 700; margin: 0.3rem 0; }
    .podium-card .pts  { font-size: 2rem; font-weight: 800; color: #c8a84b; }
    .podium-card .sub  { font-size: 0.75rem; color: #8aabcc; margin-top: 0.4rem; }

    .phase-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .phase-table th, .phase-table td {
      padding: 0.6rem 0.8rem;
      border: 1px solid #1e3a5c;
      text-align: center;
      font-size: 0.88rem;
    }
    .phase-table th { background: #0d2137; color: #c8a84b; font-weight: 600; }
    .phase-table tr:nth-child(even) td { background: #0d1e33; }
    .phase-table td:first-child { text-align: left; font-weight: 600; }

    /* Matches */
    .phase-header {
      background: linear-gradient(90deg, #1a3a5c, transparent);
      border-left: 3px solid #c8a84b;
      padding: 0.5rem 0.75rem;
      margin: 1.25rem 0 0.5rem;
      font-weight: 700;
      font-size: 1rem;
      color: #c8a84b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .phase-section { margin-bottom: 0.5rem; }

    .group-label {
      font-size: 0.8rem;
      color: #8aabcc;
      margin: 0.75rem 0 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .match-card {
      background: #0d2137;
      border: 1px solid #1e3a5c;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .match-card.finished { border-color: #1a4a1a; background: #0a1e0a; }
    .match-card.today    { border-color: #c8a84b; }

    .match-num { font-size: 0.7rem; color: #5a7a9c; min-width: 28px; }
    .match-date { font-size: 0.75rem; color: #8aabcc; min-width: 100px; }
    .match-teams {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      min-width: 200px;
    }
    .team-name { font-weight: 600; }
    .score-box {
      background: #0a1628;
      border: 1px solid #2a4a6c;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-weight: 700;
      font-size: 1rem;
      color: #4caf50;
      min-width: 60px;
      text-align: center;
    }
    .score-box.pending { color: #8aabcc; }

    .match-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .btn {
      padding: 0.3rem 0.7rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-gold    { background: #c8a84b; color: #0a1628; }
    .btn-blue    { background: #1a5a9c; color: #fff; }
    .btn-green   { background: #2a7a3a; color: #fff; }
    .btn-red     { background: #7a2a2a; color: #fff; }
    .btn-sm      { padding: 0.2rem 0.5rem; font-size: 0.75rem; }

    /* Bets */
    .bet-filters {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    select, input[type=number], input[type=text] {
      background: #0d2137;
      border: 1px solid #2a4a6c;
      color: #e0e6f0;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    label { font-size: 0.85rem; color: #8aabcc; }

    .bet-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #0d2137;
      border: 1px solid #1e3a5c;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
      font-size: 0.88rem;
    }

    .bet-row .teams { flex: 1; font-weight: 600; min-width: 160px; }
    .bet-row .pred  { color: #c8a84b; font-weight: 700; min-width: 50px; }
    .bet-row .pts   { min-width: 60px; text-align: center; }
    .pts.exact  { color: #4caf50; font-weight: 800; }
    .pts.correct{ color: #ff9800; font-weight: 700; }
    .pts.wrong  { color: #f44336; }
    .pts.open   { color: #5a7a9c; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }

    .modal {
      background: #0d2137;
      border: 1px solid #2a4a6c;
      border-radius: 12px;
      padding: 1.5rem;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
    }

    .modal h3 { color: #c8a84b; margin-bottom: 1rem; font-size: 1rem; }
    .modal .close { float: right; cursor: pointer; color: #8aabcc; font-size: 1.2rem; }
    .modal .field { margin-bottom: 0.75rem; }
    .modal .field label { display: block; margin-bottom: 0.25rem; }
    .modal .field input { width: 100%; }
    .modal .actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #1a5a9c; color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #7a2a2a; }

    .hidden { display: none !important; }

    .loading { text-align: center; color: #8aabcc; padding: 2rem; }
    .empty   { text-align: center; color: #5a7a9c; padding: 1.5rem; font-style: italic; }

    @media (max-width: 600px) {
      .match-teams { min-width: 100%; }
      .podium-card .pts { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <span>⚽</span>
  <h1>Bolão Copa do Mundo 2026</h1>
</header>

<nav>
  <button class="active" onclick="showTab('tab-scores')">🏆 Placar</button>
  <button onclick="showTab('tab-matches')">📅 Jogos</button>
  <button onclick="showTab('tab-bets')">🎯 Apostas</button>
</nav>

<main>
  <!-- SCORES TAB -->
  <div id="tab-scores" class="tab active">
    <div class="loading" id="scores-loading">Carregando...</div>
    <div id="scores-content" class="hidden"></div>
  </div>

  <!-- MATCHES TAB -->
  <div id="tab-matches" class="tab">
    <div class="loading" id="matches-loading">Carregando...</div>
    <div id="matches-content" class="hidden"></div>
  </div>

  <!-- BETS TAB -->
  <div id="tab-bets" class="tab">
    <div class="bet-filters">
      <div>
        <label>Participante</label><br/>
        <select id="bet-participant-filter" onchange="loadBets()">
          <option value="">Todos</option>
        </select>
      </div>
      <div>
        <label>Fase</label><br/>
        <select id="bet-phase-filter" onchange="loadBets()">
          <option value="">Todas</option>
        </select>
      </div>
    </div>
    <div class="loading" id="bets-loading">Carregando...</div>
    <div id="bets-content" class="hidden"></div>
  </div>
</main>

<!-- Result Modal -->
<div id="result-modal" class="modal-overlay hidden">
  <div class="modal">
    <span class="close" onclick="closeModal('result-modal')">✕</span>
    <h3 id="result-modal-title">Registrar Resultado</h3>
    <div class="field">
      <label id="result-home-label">Casa</label>
      <input type="number" id="result-home" min="0" max="30" value="0" />
    </div>
    <div class="field">
      <label id="result-away-label">Fora</label>
      <input type="number" id="result-away" min="0" max="30" value="0" />
    </div>
    <div class="actions">
      <button class="btn btn-red" onclick="closeModal('result-modal')">Cancelar</button>
      <button class="btn btn-green" onclick="submitResult()">Salvar</button>
    </div>
  </div>
</div>

<!-- Bet Modal -->
<div id="bet-modal" class="modal-overlay hidden">
  <div class="modal">
    <span class="close" onclick="closeModal('bet-modal')">✕</span>
    <h3 id="bet-modal-title">Registrar Aposta</h3>
    <div class="field">
      <label>Participante</label>
      <select id="bet-modal-participant" style="width:100%"></select>
    </div>
    <div class="field">
      <label id="bet-home-label">Casa</label>
      <input type="number" id="bet-home" min="0" max="30" value="1" />
    </div>
    <div class="field">
      <label id="bet-away-label">Fora</label>
      <input type="number" id="bet-away" min="0" max="30" value="0" />
    </div>
    <div class="actions">
      <button class="btn btn-red" onclick="closeModal('bet-modal')">Cancelar</button>
      <button class="btn btn-gold" onclick="submitBet()">Apostar</button>
    </div>
  </div>
</div>

<!-- Teams Modal for knockout -->
<div id="teams-modal" class="modal-overlay hidden">
  <div class="modal">
    <span class="close" onclick="closeModal('teams-modal')">✕</span>
    <h3>Definir Times</h3>
    <div class="field">
      <label>Time da Casa</label>
      <select id="teams-home" style="width:100%"></select>
    </div>
    <div class="field">
      <label>Time Visitante</label>
      <select id="teams-away" style="width:100%"></select>
    </div>
    <div class="actions">
      <button class="btn btn-red" onclick="closeModal('teams-modal')">Cancelar</button>
      <button class="btn btn-blue" onclick="submitTeams()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = 'http://localhost:8000/api';
let participants = [], phases = [], teams = [], allMatches = [];
let currentResultMatchId = null, currentBetMatchId = null, currentTeamsMatchId = null;
let editingBetId = null;

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || r.statusText);
  }
  if (r.status === 204) return null;
  return r.json();
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3000);
}

function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = ['tab-scores','tab-matches','tab-bets'].indexOf(id);
  document.querySelectorAll('nav button')[idx].classList.add('active');
  if (id === 'tab-scores') loadScores();
  if (id === 'tab-matches') loadMatches();
  if (id === 'tab-bets') loadBets();
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ── SCORES ────────────────────────────────────────────────────────────────────

async function loadScores() {
  document.getElementById('scores-loading').classList.remove('hidden');
  document.getElementById('scores-content').classList.add('hidden');
  try {
    const scores = await api('/scores/');
    renderScores(scores);
  } catch(e) { toast('Erro ao carregar placar: ' + e.message, true); }
  document.getElementById('scores-loading').classList.add('hidden');
  document.getElementById('scores-content').classList.remove('hidden');
}

function renderScores(scores) {
  const medals = ['🥇','🥈','🥉','4️⃣'];
  const rankClass = ['rank-1','rank-2','rank-3','rank-4'];

  let podium = `<div class="podium">`;
  scores.forEach((s, i) => {
    podium += `
      <div class="podium-card ${rankClass[i] || ''}">
        <div class="rank">${medals[i] || i+1}</div>
        <div class="name">${s.participant.name}</div>
        <div class="pts">${s.total_points} pts</div>
        <div class="sub">✅ ${s.exact_scores} exatos · 🎯 ${s.correct_outcomes} resultados</div>
        <div class="sub" style="color:#c8a84b">💸 R$ ${s.total_spent.toFixed(2)} investidos</div>
      </div>`;
  });
  podium += `</div>`;

  // Phase breakdown table
  const phaseNames = scores.length > 0
    ? scores[0].by_phase.map(p => p.phase.name)
    : [];

  let table = `<table class="phase-table">
    <thead><tr>
      <th>Participante</th>
      ${phaseNames.map(n => `<th>${n}</th>`).join('')}
      <th>Total</th>
    </tr></thead><tbody>`;

  scores.forEach(s => {
    table += `<tr>
      <td>${s.participant.name}</td>
      ${s.by_phase.map(p => `<td>${p.points}</td>`).join('')}
      <td><strong>${s.total_points}</strong></td>
    </tr>`;
  });
  table += `</tbody></table>`;

  document.getElementById('scores-content').innerHTML = podium + table;
}

// ── MATCHES ────────────────────────────────────────────────────────────────────

async function loadMatches() {
  document.getElementById('matches-loading').classList.remove('hidden');
  document.getElementById('matches-content').classList.add('hidden');
  try {
    allMatches = await api('/matches/');
    phases = phases.length ? phases : await api('/phases');
    renderMatches(allMatches);
  } catch(e) { toast('Erro ao carregar jogos: ' + e.message, true); }
  document.getElementById('matches-loading').classList.add('hidden');
  document.getElementById('matches-content').classList.remove('hidden');
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' })
       + ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function isToday(iso) {
  const d = new Date(iso), n = new Date();
  return d.toDateString() === n.toDateString();
}

function renderMatches(matches) {
  const byPhase = {};
  matches.forEach(m => {
    const key = m.phase.id;
    if (!byPhase[key]) byPhase[key] = { phase: m.phase, byGroup: {} };
    const g = m.group ? m.group.name : '_knockout';
    if (!byPhase[key].byGroup[g]) byPhase[key].byGroup[g] = [];
    byPhase[key].byGroup[g].push(m);
  });

  let html = '';
  Object.values(byPhase).sort((a,b) => a.phase.order - b.phase.order).forEach(({ phase, byGroup }) => {
    const total = Object.values(byGroup).flat().length;
    const done  = Object.values(byGroup).flat().filter(m => m.is_finished).length;
    html += `
      <div class="phase-section">
        <div class="phase-header" onclick="toggleSection('phase-${phase.id}')">
          <span>${phase.name}</span>
          <span style="font-size:0.8rem;color:#8aabcc">${done}/${total} encerrados ▾</span>
        </div>
        <div id="phase-${phase.id}">`;

    Object.entries(byGroup).sort(([a],[b]) => a.localeCompare(b)).forEach(([grp, gmatches]) => {
      if (grp !== '_knockout') html += `<div class="group-label">Grupo ${grp}</div>`;
      gmatches.forEach(m => { html += renderMatchCard(m); });
    });
    html += `</div></div>`;
  });

  document.getElementById('matches-content').innerHTML = html || '<div class="empty">Nenhum jogo encontrado</div>';
}

function toggleSection(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

function teamLabel(team, side) {
  if (team) return `${team.flag || ''} ${team.name}`;
  return side === 'home' ? 'A definir' : 'A definir';
}

function renderMatchCard(m) {
  const todayCls = isToday(m.match_date) ? 'today' : '';
  const finCls   = m.is_finished ? 'finished' : '';
  const scoreHtml = m.is_finished
    ? `<span class="score-box">${m.home_score} – ${m.away_score}</span>`
    : `<span class="score-box pending">vs</span>`;

  let actions = '';
  if (!m.is_finished) {
    if (!m.home_team_id) {
      actions += `<button class="btn btn-blue btn-sm" onclick="openTeamsModal(${m.id})">🔗 Times</button>`;
    }
    actions += `<button class="btn btn-gold btn-sm" onclick="openBetModal(${m.id})">🎯 Apostar R$${m.phase.bet_value}</button>`;
    actions += `<button class="btn btn-green btn-sm" onclick="openResultModal(${m.id})">✅ Resultado</button>`;
  }

  return `
    <div class="match-card ${finCls} ${todayCls}" data-id="${m.id}">
      <span class="match-num">#${m.match_number}</span>
      <span class="match-date">${fmtDate(m.match_date)}</span>
      <div class="match-teams">
        <span class="team-name">${teamLabel(m.home_team, 'home')}</span>
        ${scoreHtml}
        <span class="team-name">${teamLabel(m.away_team, 'away')}</span>
      </div>
      <div class="match-actions">${actions}</div>
    </div>`;
}

// ── RESULT MODAL ───────────────────────────────────────────────────────────────

function openResultModal(matchId) {
  const m = allMatches.find(x => x.id === matchId);
  if (!m) return;
  currentResultMatchId = matchId;
  document.getElementById('result-modal-title').textContent = `Resultado: ${teamLabel(m.home_team,'home')} x ${teamLabel(m.away_team,'away')}`;
  document.getElementById('result-home-label').textContent = teamLabel(m.home_team, 'home');
  document.getElementById('result-away-label').textContent = teamLabel(m.away_team, 'away');
  document.getElementById('result-home').value = m.home_score ?? 0;
  document.getElementById('result-away').value = m.away_score ?? 0;
  openModal('result-modal');
}

async function submitResult() {
  try {
    await api(`/matches/${currentResultMatchId}/result`, 'PUT', {
      home_score: parseInt(document.getElementById('result-home').value),
      away_score: parseInt(document.getElementById('result-away').value),
    });
    toast('Resultado salvo!');
    closeModal('result-modal');
    loadMatches();
    loadScores();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

// ── BET MODAL ──────────────────────────────────────────────────────────────────

async function openBetModal(matchId) {
  const m = allMatches.find(x => x.id === matchId);
  if (!m) return;
  currentBetMatchId = matchId;
  editingBetId = null;
  if (!participants.length) participants = await api('/participants');

  const sel = document.getElementById('bet-modal-participant');
  sel.innerHTML = participants.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('bet-modal-title').textContent =
    `Apostar: ${teamLabel(m.home_team,'home')} x ${teamLabel(m.away_team,'away')}`;
  document.getElementById('bet-home-label').textContent = teamLabel(m.home_team,'home');
  document.getElementById('bet-away-label').textContent = teamLabel(m.away_team,'away');
  document.getElementById('bet-home').value = 1;
  document.getElementById('bet-away').value = 0;
  openModal('bet-modal');
}

async function submitBet() {
  try {
    const participantId = parseInt(document.getElementById('bet-modal-participant').value);
    const home = parseInt(document.getElementById('bet-home').value);
    const away = parseInt(document.getElementById('bet-away').value);

    if (editingBetId) {
      await api(`/bets/${editingBetId}`, 'PUT', { predicted_home: home, predicted_away: away });
      toast('Aposta atualizada!');
    } else {
      await api('/bets/', 'POST', {
        participant_id: participantId,
        match_id: currentBetMatchId,
        predicted_home: home,
        predicted_away: away,
      });
      toast('Aposta registrada!');
    }
    closeModal('bet-modal');
    if (document.getElementById('tab-bets').classList.contains('active')) loadBets();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

// ── TEAMS MODAL ────────────────────────────────────────────────────────────────

async function openTeamsModal(matchId) {
  currentTeamsMatchId = matchId;
  if (!teams.length) teams = await api('/teams');
  const opts = teams.map(t => `<option value="${t.id}">${t.flag || ''} ${t.name}</option>`).join('');
  document.getElementById('teams-home').innerHTML = opts;
  document.getElementById('teams-away').innerHTML = opts;
  openModal('teams-modal');
}

async function submitTeams() {
  try {
    await api(`/matches/${currentTeamsMatchId}/teams`, 'PUT', {
      home_team_id: parseInt(document.getElementById('teams-home').value),
      away_team_id: parseInt(document.getElementById('teams-away').value),
    });
    toast('Times definidos!');
    closeModal('teams-modal');
    loadMatches();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

// ── BETS ────────────────────────────────────────────────────────────────────────

async function loadBets() {
  document.getElementById('bets-loading').classList.remove('hidden');
  document.getElementById('bets-content').classList.add('hidden');
  try {
    if (!participants.length) participants = await api('/participants');
    if (!phases.length) phases = await api('/phases');

    const pFilter = document.getElementById('bet-participant-filter');
    const phFilter = document.getElementById('bet-phase-filter');

    if (pFilter.options.length <= 1) {
      participants.forEach(p => {
        const o = new Option(p.name, p.id);
        pFilter.add(o);
      });
    }
    if (phFilter.options.length <= 1) {
      phases.forEach(ph => {
        const o = new Option(ph.name, ph.id);
        phFilter.add(o);
      });
    }

    const pid = pFilter.value, phid = phFilter.value;
    let url = '/bets/?';
    if (pid) url += `participant_id=${pid}&`;
    if (phid) {
      // filter by phase client-side (bets endpoint doesn't filter by phase directly)
    }

    let bets = await api(url);
    if (phid) bets = bets.filter(b => b.match.phase.id == phid);

    renderBets(bets);
  } catch(e) { toast('Erro ao carregar apostas: ' + e.message, true); }
  document.getElementById('bets-loading').classList.add('hidden');
  document.getElementById('bets-content').classList.remove('hidden');
}

function ptsLabel(bet) {
  if (!bet.match.is_finished) return `<span class="pts open">—</span>`;
  if (bet.points_earned === 3) return `<span class="pts exact">+3 🎯</span>`;
  if (bet.points_earned === 1) return `<span class="pts correct">+1 ✓</span>`;
  return `<span class="pts wrong">0 ✗</span>`;
}

function renderBets(bets) {
  if (!bets.length) {
    document.getElementById('bets-content').innerHTML = '<div class="empty">Nenhuma aposta encontrada</div>';
    return;
  }

  // Group by phase then participant
  const byPhase = {};
  bets.forEach(b => {
    const k = b.match.phase.id;
    if (!byPhase[k]) byPhase[k] = { phase: b.match.phase, bets: [] };
    byPhase[k].bets.push(b);
  });

  let html = '';
  Object.values(byPhase).sort((a,b) => a.phase.order - b.phase.order).forEach(({ phase, bets: phaseBets }) => {
    html += `<div class="phase-header" style="margin-top:1rem">${phase.name}</div>`;
    phaseBets.sort((a,b) => new Date(a.match.match_date) - new Date(b.match.match_date)).forEach(b => {
      const home = teamLabel(b.match.home_team, 'home');
      const away = teamLabel(b.match.away_team, 'away');
      const resultStr = b.match.is_finished
        ? ` (${b.match.home_score}–${b.match.away_score})` : '';
      html += `
        <div class="bet-row">
          <span class="teams">${home} x ${away}${resultStr}</span>
          <span style="color:#8aabcc;font-size:0.8rem">${b.participant.name}</span>
          <span class="pred">${b.predicted_home}–${b.predicted_away}</span>
          ${ptsLabel(b)}
          ${!b.match.is_finished ? `
            <button class="btn btn-blue btn-sm" onclick="editBet(${b.id}, ${b.match.id}, '${home}', '${away}', ${b.predicted_home}, ${b.predicted_away}, ${b.participant.id})">✏️</button>
            <button class="btn btn-red btn-sm" onclick="deleteBet(${b.id})">🗑</button>
          ` : ''}
        </div>`;
    });
  });

  document.getElementById('bets-content').innerHTML = html;
}

async function editBet(betId, matchId, home, away, ph, pa, participantId) {
  currentBetMatchId = matchId;
  editingBetId = betId;
  if (!participants.length) participants = await api('/participants');
  const sel = document.getElementById('bet-modal-participant');
  sel.innerHTML = participants.map(p => `<option value="${p.id}" ${p.id==participantId?'selected':''}>${p.name}</option>`).join('');
  sel.disabled = true;
  document.getElementById('bet-modal-title').textContent = `Editar Aposta: ${home} x ${away}`;
  document.getElementById('bet-home-label').textContent = home;
  document.getElementById('bet-away-label').textContent = away;
  document.getElementById('bet-home').value = ph;
  document.getElementById('bet-away').value = pa;
  openModal('bet-modal');
}

document.getElementById('bet-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('bet-modal')) {
    document.getElementById('bet-modal-participant').disabled = false;
  }
});

async function deleteBet(betId) {
  if (!confirm('Remover aposta?')) return;
  try {
    await api(`/bets/${betId}`, 'DELETE');
    toast('Aposta removida');
    loadBets();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

// ── INIT ───────────────────────────────────────────────────────────────────────
loadScores();
</script>
